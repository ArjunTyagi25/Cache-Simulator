simulation:
  name: test19_mfu_dynamic_counts
  description: MFU metadata should update correctly after replacement and later accesses.
  verbose: true
  trace_file: ../test/test-19/trace.txt

memory_hierarchy:
  levels:
    - name: "MAIN"
      memory_size: 128
      page_size: 32
      line_size: 4
      read_latency: 100
      write_latency: 100

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 16
      line_size: 4
      assoc: 2
      replacement_policy: MFU
      write_policy: write_back
      write_allocate: true
      read_latency: 1
      write_latency: 1

expected:
  result: pass
  total_accesses: 11
  total_hits: 7
  read_hits: 7
  write_hits: 0
  total_misses: 4
  read_misses: 0
  write_misses: 4
  total_evictions: 2
  dirty_evictions: 2
  non_dirty_evictions: 0
  total_latency: 615
