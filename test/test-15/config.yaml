name: test15_random_four_way_range
description: Random replacement in a 4-way set should not evict from another set.

config:
  memory_size: 128
  page_size: 32
  cache_size: 32
  line_size: 4
  assoc: 4
  replacement_policy: random
  write_policy: write_back
  write_allocate: true
  verbose: false
  trace_file: ../test/test-15/trace.txt

expected:
  result: pass
  total_accesses: 13
  total_hits: 4
  read_hits: 4
  write_hits: 0
  total_misses: 9
  read_misses: 0
  write_misses: 9
  total_evictions: 1
  dirty_evictions: 1
  non_dirty_evictions: 0
