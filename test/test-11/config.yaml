name: test11_write_through_no_allocate
description: Write miss should update memory but should not allocate into cache.

config:
  memory_size: 128
  page_size: 32
  cache_size: 16
  line_size: 4
  assoc: 1
  replacement_policy: first_line
  write_policy: write_through
  write_allocate: false
  verbose: false
  trace_file: trace.txt

expected:
  result: pass
  total_accesses: 3
  total_hits: 1
  read_hits: 1
  write_hits: 0
  total_misses: 2
  read_misses: 1
  write_misses: 1
  total_evictions: 0
  dirty_evictions: 0
  non_dirty_evictions: 0
