simulation:
  name: test11_write_through_no_allocate
  description: Write miss should update memory but should not allocate into the cache.
  verbose: true
  trace_file: ../test/test-11/trace.txt

memory_hierarchy:
  levels:
    - name: "MAIN"
      memory_size: 128
      page_size: 32
      line_size: 4
      read_latency: 100
      write_latency: 100

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 16
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_through
      write_allocate: false
      read_latency: 1
      write_latency: 1

expected:
  result: pass
  total_accesses: 3
  total_hits: 1
  read_hits: 1
  write_hits: 0
  total_misses: 2
  read_misses: 1
  write_misses: 1
  total_evictions: 0
  dirty_evictions: 0
  non_dirty_evictions: 0
  total_latency: 204