simulation:
  name: test_28_same_line_multiple_writes
  description: Multiple writes to different byte offsets within the same cache line.
  verbose: true
  trace_file: ../test/test-21/trace.txt

memory_hierarchy:
  levels:
    - name: "MAIN"
      memory_size: 128
      page_size: 32
      line_size: 4

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 16
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_back
      write_allocate: true

    - name: L2
      cache_size: 32
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_back
      write_allocate: true
