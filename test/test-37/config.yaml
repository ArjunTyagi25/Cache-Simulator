simulation:
  name: test37_lru_per_set
  description: LRU metadata should be maintained independently for each cache set.
  verbose: true
  trace_file: ../test/test-37/trace.txt

memory_hierarchy:
  levels:
    - name: MAIN
      memory_size: 128
      page_size: 32
      line_size: 4

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 16
      line_size: 4
      assoc: 2
      replacement_policy: LRU
      write_policy: write_back
      write_allocate: true
