simulation:
  name: test_38_same_value_write_l3_hit
  description: Establishes a known value in L3 and then performs a same-value write that misses in L1 and L2 but hits in L3.
  verbose: true
  trace_file: ../test/test-30/trace.txt

memory_hierarchy:
  levels:
    - name: "MAIN"
      memory_size: 128
      page_size: 32
      line_size: 4

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 4
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_through
      write_allocate: true

    - name: L2
      cache_size: 4
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_back
      write_allocate: true

    - name: L3
      cache_size: 8
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_back
      write_allocate: true
