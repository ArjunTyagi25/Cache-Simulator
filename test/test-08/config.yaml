name: test08_larger_line_size
description: Tests 8-byte cache lines to catch hardcoded 4-byte line assumptions.

config:
  memory_size: 128
  page_size: 32
  cache_size: 32
  line_size: 8
  assoc: 1
  replacement_policy: first_line
  write_policy: write_back
  write_allocate: true
  verbose: false
  trace_file: ../test/test-08/trace.txt

expected:
  result: pass
  total_accesses: 7
  total_hits: 5
  read_hits: 4
  write_hits: 1
  total_misses: 2
  read_misses: 0
  write_misses: 2
  total_evictions: 0
  dirty_evictions: 0
  non_dirty_evictions: 0
