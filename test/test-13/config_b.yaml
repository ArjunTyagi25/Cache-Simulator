simulation:
  name: test13b_write_through_clean_evictions
  description: Write-through policy should evict clean lines because memory is updated immediately.
  verbose: false
  trace_file: ../test/test-13/trace.txt

memory_hierarchy:
  levels:
    - name: "MAIN"
      memory_size: 128
      page_size: 32
      line_size: 4

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 8
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_through
      write_allocate: true

expected:
  result: pass
  total_accesses: 3
  total_hits: 0
  read_hits: 0
  write_hits: 0
  total_misses: 3
  read_misses: 1
  write_misses: 2
  total_evictions: 2
  dirty_evictions: 0
  non_dirty_evictions: 2