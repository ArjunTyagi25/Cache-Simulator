name: test13a_write_back_writeback_accounting
description: Write-back policy should create dirty evictions.

config:
  memory_size: 128
  page_size: 32
  cache_size: 8
  line_size: 4
  assoc: 1
  replacement_policy: first_line
  write_policy: write_back
  write_allocate: true
  verbose: false
  trace_file: ../test/test-13/trace.txt

expected:
  result: pass
  total_accesses: 3
  total_hits: 0
  read_hits: 0
  write_hits: 0
  total_misses: 3
  read_misses: 1
  write_misses: 2
  total_evictions: 2
  dirty_evictions: 2
  non_dirty_evictions: 0
