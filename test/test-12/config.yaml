simulation:
  name: test12_no_allocate_no_eviction
  description: A write miss with write_allocate false should not evict an existing cached line.
  verbose: true
  trace_file: ../test/test-12/trace.txt

memory_hierarchy:
  levels:
    - name: "MAIN"
      memory_size: 128
      page_size: 32
      line_size: 4
      read_latency: 100
      write_latency: 100

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 8
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_through
      write_allocate: false
      read_latency: 1
      write_latency: 1

expected:
  result: pass
  total_accesses: 5
  total_hits: 1
  read_hits: 1
  write_hits: 0
  total_misses: 4
  read_misses: 2
  write_misses: 2
  total_evictions: 1
  dirty_evictions: 0
  non_dirty_evictions: 1
  total_latency: 407