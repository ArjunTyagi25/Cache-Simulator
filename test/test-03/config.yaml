name: test03_different_sets
description: Accesses map to different direct-mapped sets, so no eviction should occur.

config:
  memory_size: 128
  page_size: 32
  cache_size: 16
  line_size: 4
  assoc: 1
  replacement_policy: first_line
  write_policy: write_back
  write_allocate: true
  verbose: false
  trace_file: ../test/test-03/trace.txt

expected:
  result: pass
  total_accesses: 8
  total_hits: 4
  read_hits: 4
  write_hits: 0
  total_misses: 4
  read_misses: 0
  write_misses: 4
  total_evictions: 0
  dirty_evictions: 0
  non_dirty_evictions: 0
