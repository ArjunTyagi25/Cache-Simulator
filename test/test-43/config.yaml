simulation:
  name: test43_plru_initial_fill
  description: Fill a 4-way PLRU set without replacement.
  verbose: true 
  trace_file: ../test/test-43/trace.txt

memory_hierarchy:
  levels:
    - name: MAIN
      memory_size: 128
      page_size: 32
      line_size: 4

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 16
      line_size: 4
      assoc: 4
      replacement_policy: PLRU
      write_policy: write_back
      write_allocate: true
