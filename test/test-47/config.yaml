simulation:
  name: test47_plru_multiple_replacements
  description: Consecutive replacements should correctly update the PLRU tree.
  verbose: true
  trace_file: ../test/test-47/trace.txt

memory_hierarchy:
  levels:
    - name: MAIN
      memory_size: 128
      page_size: 32
      line_size: 4

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 16
      line_size: 4
      assoc: 4
      replacement_policy: PLRU
      write_policy: write_back
      write_allocate: true
