simulation:
  name: test05_dirty_eviction_multibyte
  description: Dirty cache line with multiple modified bytes is evicted and later fetched back correctly.
  verbose: true
  trace_file: ../test/test-05/trace.txt

memory_hierarchy:
  levels:
    - name: "MAIN"
      memory_size: 128
      page_size: 32
      line_size: 4
      read_latency: 100
      write_latency: 100

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 8
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_back
      write_allocate: true
      read_latency: 1
      write_latency: 1

expected:
  result: pass
  total_accesses: 10
  total_hits: 6
  read_hits: 3
  write_hits: 3
  total_misses: 4
  read_misses: 2
  write_misses: 2
  total_evictions: 3
  dirty_evictions: 2
  non_dirty_evictions: 1
  total_latency: 614