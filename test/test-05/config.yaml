name: test05_dirty_eviction_multibyte
description: Dirty cache line with multiple modified bytes is evicted and later fetched back correctly.

config:
  memory_size: 128
  page_size: 32
  cache_size: 8
  line_size: 4
  assoc: 1
  replacement_policy: first_line
  write_policy: write_back
  write_allocate: true
  verbose: false
  trace_file: trace.txt

expected:
  result: pass
  total_accesses: 10
  total_hits: 6
  read_hits: 3
  write_hits: 3
  total_misses: 4
  read_misses: 2
  write_misses: 2
  total_evictions: 3
  dirty_evictions: 2
  non_dirty_evictions: 1
