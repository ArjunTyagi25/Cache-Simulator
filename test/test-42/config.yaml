simulation:
  name: test42_multiple_promotions
  description: Multiple L2-to-L1 promotions should maintain correct LRU ordering.
  verbose: true
  trace_file: ../test/test-42/trace.txt

memory_hierarchy:
  levels:
    - name: MAIN
      memory_size: 128
      page_size: 32
      line_size: 4

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 8
      line_size: 4
      assoc: 2
      replacement_policy: LRU
      write_policy: write_back
      write_allocate: true

    - name: L2
      cache_size: 16
      line_size: 4
      assoc: 2
      replacement_policy: LRU
      write_policy: write_back
      write_allocate: true
