simulation:
  name: test45_plru_recently_used_survives
  description: Recently accessed line should not be selected as the PLRU victim.
  verbose: true
  trace_file: ../test/test-45/trace.txt

memory_hierarchy:
  levels:
    - name: MAIN
      memory_size: 128
      page_size: 32
      line_size: 4

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 16
      line_size: 4
      assoc: 4
      replacement_policy: PLRU
      write_policy: write_back
      write_allocate: true
