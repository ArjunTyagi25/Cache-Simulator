simulation:
  name: test10_assoc_first_line
  description: Tests first_line replacement in a 2-way set.
  verbose: true
  trace_file: ../test/test-10/trace.txt

memory_hierarchy:
  levels:
    - name: "MAIN"
      memory_size: 128
      page_size: 32
      line_size: 4
      read_latency: 100
      write_latency: 100

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 16
      line_size: 4
      assoc: 2
      replacement_policy: first_line
      write_policy: write_back
      write_allocate: true
      read_latency: 1
      write_latency: 1

expected:
  result: pass
  total_accesses: 6
  total_hits: 1
  read_hits: 1
  write_hits: 0
  total_misses: 5
  read_misses: 2
  write_misses: 3
  total_evictions: 3
  dirty_evictions: 2
  non_dirty_evictions: 1
  total_latency: 711