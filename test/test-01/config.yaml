simulation:
  name: test01_basic_write_read
  description: Basic write followed by read from the same byte.
  verbose: true
  trace_file: ../test/test-01/trace.txt

memory_hierarchy:
  levels:
    - name: "MAIN"
      memory_size: 128
      page_size: 32
      line_size: 4

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 16
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_back
      write_allocate: true

expected:
  result: pass
  total_accesses: 2
  total_hits: 1
  read_hits: 1
  write_hits: 0
  total_misses: 1
  read_misses: 0
  write_misses: 1
  total_evictions: 0
  dirty_evictions: 0
  non_dirty_evictions: 0
