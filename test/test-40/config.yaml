simulation:
  name: test40_l1_eviction_only
  description: L1 evictions should not modify the LRU ordering maintained by L2.
  verbose: true
  trace_file: ../test/test-40/trace.txt

memory_hierarchy:
  levels:
    - name: MAIN
      memory_size: 128
      page_size: 32
      line_size: 4
      read_latency: 100
      write_latency: 100

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 8
      line_size: 4
      assoc: 2
      replacement_policy: LRU
      write_policy: write_back
      write_allocate: true
      read_latency: 1
      write_latency: 1

    - name: L2
      cache_size: 16
      line_size: 4
      assoc: 2
      replacement_policy: LRU
      write_policy: write_back
      write_allocate: true
      read_latency: 5
      write_latency: 5

expected:
  total_latency: 1093
