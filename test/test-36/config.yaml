simulation:
  name: test36_lru_four_way
  description: Verify true LRU behavior in a four-way associative cache.
  verbose: true
  trace_file: ../test/test-36/trace.txt

memory_hierarchy:
  levels:
    - name: MAIN
      memory_size: 128
      page_size: 32
      line_size: 4

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 32
      line_size: 4
      assoc: 4
      replacement_policy: LRU
      write_policy: write_back
      write_allocate: true
