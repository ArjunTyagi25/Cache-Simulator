simulation:
  name: test49_plru_dirty_eviction
  description: Verify dirty write-back during PLRU replacement.
  verbose: true
  trace_file: ../test/test-49/trace.txt

memory_hierarchy:
  levels:
    - name: MAIN
      memory_size: 128
      page_size: 32
      line_size: 4
      read_latency: 100
      write_latency: 100

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 16
      line_size: 4
      assoc: 4
      replacement_policy: PLRU
      write_policy: write_back
      write_allocate: true
      read_latency: 1
      write_latency: 1

expected:
  total_latency: 613
