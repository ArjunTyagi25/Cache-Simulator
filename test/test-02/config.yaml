name: test02_same_line_offsets
description: Multiple byte writes to different offsets in the same cache line.

config:
  memory_size: 128
  page_size: 32
  cache_size: 16
  line_size: 4
  assoc: 1
  replacement_policy: first_line
  write_policy: write_back
  write_allocate: true
  verbose: false
  trace_file: ../test/test-02/trace.txt

expected:
  result: pass
  total_accesses: 8
  total_hits: 7
  read_hits: 4
  write_hits: 3
  total_misses: 1
  read_misses: 0
  write_misses: 1
  total_evictions: 0
  dirty_evictions: 0
  non_dirty_evictions: 0
