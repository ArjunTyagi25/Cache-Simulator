simulation:
  name: test_35_upper_write_allocate_lower_no_write_allocate
  description: L1 write-allocate should still preserve inclusion when lower levels are no-write-allocate.
  verbose: true
  trace_file: ../test/test-28/trace.txt

memory_hierarchy:
  levels:
    - name: "MAIN"
      memory_size: 128
      page_size: 32
      line_size: 4

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 4
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_back
      write_allocate: true

    - name: L2
      cache_size: 4
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_through
      write_allocate: false

    - name: L3
      cache_size: 8
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_back
      write_allocate: false
