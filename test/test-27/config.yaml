simulation:
  name: test_34_l1_no_write_allocate
  description: L1 write miss should not allocate in L1 when no-write-allocate is enabled.
  verbose: true
  trace_file: ../test/test-27/trace.txt

memory_hierarchy:
  levels:
    - name: "MAIN"
      memory_size: 128
      page_size: 32
      line_size: 4

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 4
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_through
      write_allocate: false

    - name: L2
      cache_size: 8
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_back
      write_allocate: true
