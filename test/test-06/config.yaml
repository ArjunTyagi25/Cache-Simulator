simulation:
  name: test06_page_boundary_no_eviction
  description: Accesses across a page boundary should still map to the correct cache lines.
  verbose: false
  trace_file: ../test/test-06/trace.txt

memory_hierarchy:
  levels:
    - name: "MAIN"
      memory_size: 128
      page_size: 32
      line_size: 4

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 16
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_back
      write_allocate: true

expected:
  result: pass
  total_accesses: 4
  total_hits: 2
  read_hits: 2
  write_hits: 0
  total_misses: 2
  read_misses: 0
  write_misses: 2
  total_evictions: 0
  dirty_evictions: 0
  non_dirty_evictions: 0