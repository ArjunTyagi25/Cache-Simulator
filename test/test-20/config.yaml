name: test20_intentional_failure
description: Simulator should detect a read-value mismatch.

config:
  memory_size: 128
  page_size: 32
  cache_size: 16
  line_size: 4
  assoc: 1
  replacement_policy: first_line
  write_policy: write_back
  write_allocate: true
  verbose: false
  trace_file: ../test/test-20/trace.txt

expected:
  result: fail
  failure_type: read_mismatch
  total_accesses: 2
  total_hits: 1
  read_hits: 1
  write_hits: 0
  total_misses: 1
  read_misses: 0
  write_misses: 1
  total_evictions: 0
  dirty_evictions: 0
  non_dirty_evictions: 0
