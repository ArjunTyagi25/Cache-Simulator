simulation:
  name: read_05_miss_all_levels
  description: Line is evicted from every cache level, so later read goes to main memory again.
  verbose: true
  trace_file: ../test/test-25/trace.txt

memory_hierarchy:
  levels:
    - name: "MAIN"
      memory_size: 128
      page_size: 32
      line_size: 4

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 4
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_back
      write_allocate: true

    - name: L2
      cache_size: 4
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_back
      write_allocate: true

    - name: L3
      cache_size: 4
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_back
      write_allocate: true
