simulation:
  name: test_23_dirty_l2_eviction_to_l3
  description: Dirty L2 eviction should update the existing L3 copy.
  verbose: true
  trace_file: ../test/test-23/trace.txt

memory_hierarchy:
  levels:
    - name: "MAIN"
      memory_size: 128
      page_size: 32
      line_size: 4
      read_latency: 100
      write_latency: 100

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 4
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_back
      write_allocate: true
      read_latency: 1
      write_latency: 1

    - name: L2
      cache_size: 4
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_back
      write_allocate: true
      read_latency: 5
      write_latency: 5

    - name: L3
      cache_size: 8
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_back
      write_allocate: true
      read_latency: 20
      write_latency: 20

expected:
  total_latency: 418
