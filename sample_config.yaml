simulation:
  name: sample_test
  description: This is a sample configuration file
  verbose: false
  trace_file: ../test/sample_trace.txt

memory:
  memory_size: 128
  page_size: 32

cache_hierarchy:
  levels:
    - name: L1
      cache_size: 16
      line_size: 4
      assoc: 1
      replacement_policy: first_line
      write_policy: write_back
      write_allocate: true

    - name: L2
      cache_size: 32
      line_size: 4
      assoc: 2
      replacement_policy: LFU
      write_policy: write_back
      write_allocate: true
